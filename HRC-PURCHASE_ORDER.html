<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HRC Ledger — Project Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --paper:#EFF3EA;
    --paper-line:#c7d2c1;
    --card:#F8FAF5;
    --ink:#1E2A22;
    --ink-soft:#57685C;
    --ink-faint:#8b988a;
    --accent:#2F5233;
    --accent-hover:#203d24;
    --accent-tint:#e2ead9;
    --amber:#a97425;
    --amber-tint:#f4e6cd;
    --teal:#3D6E68;
    --teal-tint:#dcebe9;
    --rust:#a04530;
    --rust-tint:#f3e0da;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
    line-height:1.45;
  }
  .app{
    max-width:1180px;
    margin:0 auto;
    padding:28px 24px 60px;
  }
  header.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
    padding:14px 22px;
    background:var(--ink);
    border-radius:4px;
  }
  header.top .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  header.top img.logo{
    height:44px;
    width:auto;
    display:block;
  }
  header.top .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:#c9d4c3;
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .layout{
    display:grid;
    grid-template-columns:290px 1fr;
    gap:22px;
    align-items:start;
  }
  @media (max-width:820px){
    .layout{grid-template-columns:1fr;}
  }
  .panel{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:3px;
  }
  .sidebar{padding:16px;}
  .sidebar h2{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    margin:0 0 12px;
  }
  .project-item{
    display:block;
    width:100%;
    text-align:left;
    background:transparent;
    border:1px solid transparent;
    border-radius:3px;
    padding:10px 10px;
    margin-bottom:6px;
    cursor:pointer;
    font-family:inherit;
  }
  .project-item:hover{background:var(--accent-tint);}
  .project-item.active{
    background:var(--accent-tint);
    border-color:var(--accent);
  }
  .project-item .pname{
    font-weight:600;
    font-size:14.5px;
    display:flex;
    justify-content:space-between;
    gap:8px;
  }
  .project-item .pmeta{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:3px;
    display:flex;
    justify-content:space-between;
  }
  .bar{
    height:4px;
    background:var(--paper-line);
    border-radius:2px;
    margin-top:6px;
    overflow:hidden;
  }
  .bar > div{height:100%;background:var(--accent);}
  .bar.over > div{background:var(--rust);}

  button{
    font-family:'IBM Plex Sans', sans-serif;
    cursor:pointer;
  }
  .btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:9px 14px;
    border-radius:3px;
    font-size:13px;
    font-weight:500;
  }
  .btn:hover{background:var(--accent-hover);}
  .btn.ghost{
    background:transparent;
    color:var(--accent);
    border:1px solid var(--accent);
  }
  .btn.ghost:hover{background:var(--accent-tint);}
  .btn.small{padding:5px 10px;font-size:12px;}
  .btn.subtle{
    background:transparent;
    color:var(--ink-soft);
    border:1px solid var(--paper-line);
  }
  .btn.subtle:hover{border-color:var(--ink-soft);color:var(--ink);}
  .btn.danger{
    background:transparent;
    color:var(--rust);
    border:1px solid var(--rust);
  }
  .btn.danger:hover{background:var(--rust-tint);}
  .btn:disabled{opacity:0.5;cursor:default;}
  .add-project-row{margin-top:10px;}

  .main{padding:20px 22px;min-height:400px;}
  .main-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:6px;
  }
  .main-head h2{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:22px;
    margin:0;
  }
  .stat-row{
    display:flex;
    gap:22px;
    flex-wrap:wrap;
    margin:14px 0 18px;
    padding:14px 0;
    border-top:1px solid var(--paper-line);
    border-bottom:1px solid var(--paper-line);
  }
  .stat{min-width:100px;}
  .stat .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
  }
  .stat .value{
    font-family:'IBM Plex Mono', monospace;
    font-size:20px;
    font-weight:600;
    margin-top:2px;
  }
  .stat .value.over{color:var(--rust);}

  .toolbar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:12px;
  }
  input[type=text], input[type=number], input[type=date], select, textarea{
    font-family:'IBM Plex Sans', sans-serif;
    font-size:13px;
    padding:8px 9px;
    border:1px solid var(--paper-line);
    border-radius:3px;
    background:#fff;
    color:var(--ink);
  }
  input:focus, select:focus, textarea:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  .search-input{flex:1;min-width:160px;}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  thead th{
    text-align:left;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    padding:8px 10px;
    border-bottom:1px solid var(--ink);
  }
  tbody td{
    padding:10px 10px;
    border-bottom:1px solid var(--paper-line);
    vertical-align:top;
  }
  tbody tr:hover{background:var(--accent-tint);}
  td.amount, th.amount{
    font-family:'IBM Plex Mono', monospace;
    text-align:right;
    white-space:nowrap;
  }
  .rowbtns{display:flex;gap:6px;flex-wrap:wrap;}

  .stamp{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    padding:3px 8px;
    border-radius:2px;
    border:1.5px solid;
    transform:rotate(-2deg);
  }
  .stamp.pending{color:var(--amber);border-color:var(--amber);background:var(--amber-tint);}
  .stamp.approved{color:var(--ink-soft);border-color:var(--ink-soft);background:#fff;}
  .stamp.paid{color:var(--teal);border-color:var(--teal);background:var(--teal-tint);transform:rotate(2deg);}

  .type-chip{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    border:1px solid var(--paper-line);
    padding:2px 6px;
    border-radius:2px;
  }
  .clip-count{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
    white-space:nowrap;
  }

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
  }
  .empty .big{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:19px;
    color:var(--ink);
    margin-bottom:6px;
  }

  .modal-overlay{
    position:fixed;inset:0;
    background:rgba(30,42,34,0.35);
    display:flex;align-items:center;justify-content:center;
    z-index:50;
    padding:20px;
    overflow:auto;
  }
  .modal{
    background:var(--card);
    border:1px solid var(--paper-line);
    border-radius:4px;
    padding:22px;
    width:100%;
    max-width:520px;
    max-height:90vh;
    overflow:auto;
    margin:auto;
  }
  .modal h3{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:19px;
    margin:0 0 16px;
  }
  .field{margin-bottom:12px;display:flex;flex-direction:column;gap:5px;}
  .field label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
  }
  .field input, .field select, .field textarea{width:100%;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{
    display:flex;justify-content:flex-end;gap:8px;margin-top:18px;
  }
  .loading{padding:60px;text-align:center;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:var(--paper);
    padding:10px 18px;border-radius:3px;font-size:12.5px;
    font-family:'IBM Plex Mono',monospace;
    opacity:0;pointer-events:none;transition:opacity 0.25s;
    z-index:100;
    max-width:80vw;
  }
  .toast.show{opacity:1;}
  .footnote{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:var(--ink-faint);
    margin-top:26px;
    text-align:center;

  .items-block{
    border:1px solid var(--paper-line);
    border-radius:3px;
    padding:12px;
    margin-bottom:12px;
    background:#fff;

  .items-block .items-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .item-row{
    display:grid;
    grid-template-columns:1fr 55px 85px 85px 26px;
    gap:6px;
    margin-bottom:6px;
    align-items:center;
  }
  .item-row input{width:100%;padding:6px 7px;font-size:12.5px;}
  .item-row .item-total{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    text-align:right;
    color:var(--ink-soft);
  }
  .item-row .rm-item{
    background:transparent;border:none;color:var(--rust);font-size:16px;line-height:1;padding:0;
  }
  .items-head-row{
    display:grid;
    grid-template-columns:1fr 55px 85px 85px 26px;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:9.5px;
    text-transform:uppercase;
    color:var(--ink-faint);
    margin-bottom:4px;
  }
  .items-total-row{
    display:flex;justify-content:flex-end;gap:8px;
    margin-top:8px;padding-top:8px;border-top:1px solid var(--paper-line);
    font-family:'IBM Plex Mono', monospace;font-size:13px;font-weight:600;
  }

  .attach-block{
    border:1px solid var(--paper-line);
    border-radius:3px;
    padding:12px;
    margin-bottom:12px;
    background:#fff;
  }
  .attach-block .attach-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  .attach-list{margin-bottom:8px;}
  .attach-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 0;
    border-bottom:1px solid var(--paper-line);
    font-size:12.5px;
    gap:8px;
  }
  .attach-item a{color:var(--accent);text-decoration:none;}
  .attach-item a:hover{text-decoration:underline;}
  .attach-item .fsize{color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:nowrap;}
  .attach-empty{color:var(--ink-faint);font-size:12.5px;padding:4px 0;}
  .attach-note{color:var(--ink-faint);font-size:12px;padding:6px 0 0;}

</head>
<body>
<div class="app" id="app">
  <div class="loading">loading ledger…</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ====== CONFIG — fill these in after creating your Supabase project ======
const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
const ATTACHMENTS_BUCKET = 'attachments';
// ============================================================================

let state = { projects: [], entries: [], lineItems: [], attachments: [] };
let ui = { selectedProjectId: null, search: '', statusFilter: 'all', editingEntry: null, modalItems: [] };
let configOk = SUPABASE_URL.indexOf('YOUR_SUPABASE') === -1 && SUPABASE_ANON_KEY.indexOf('YOUR_SUPABASE') === -1;
let sb = null;
let configError = null;
if(configOk){
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }catch(e){
    configOk = false;
    configError = e && e.message ? e.message : String(e);
  }
}

window.addEventListener('error', function(ev){
  const app = document.getElementById('app');
  if(app && app.querySelector('.loading') && !app.querySelector('.fatal-shown')){
    app.innerHTML = `
      <div class="loading fatal-shown" style="max-width:520px;margin:60px auto;text-align:left;">
        <div style="font-family:'Fraunces',serif;font-size:18px;font-style:italic;color:var(--rust);margin-bottom:10px;">Something went wrong loading the page</div>
        <div>${escapeHtml(ev.message || 'Unknown script error')}</div>
        <div style="margin-top:10px;">Check that SUPABASE_URL and SUPABASE_ANON_KEY near the top of this file are both filled in correctly, with the quotes intact, and that you're opening this file in a browser (not a text editor).</div>
      </div>
    `;
  }
});

const CATEGORIES = ['Materials','Labor','Software','Equipment','Travel','Subcontractor','Office','Other'];

function fmt(n){
  const num = Number(n)||0;
  return num.toLocaleString('en-US',{style:'currency',currency:'USD'});
}
function fmtBytes(b){
  if(!b && b!==0) return '';
  if(b < 1024) return b + ' B';
  if(b < 1024*1024) return (b/1024).toFixed(0) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}
function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36);}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2600);
}

// ---------- Data loading ----------
async function loadData(){
  if(!configOk){
    document.getElementById('app').innerHTML = `
      <div class="loading" style="max-width:520px;margin:60px auto;text-align:left;">
        <div style="font-family:'Fraunces',serif;font-size:18px;font-style:italic;color:var(--ink);margin-bottom:10px;">Almost there</div>
        <div>This app needs your Supabase project connection details before it can run. Open this file and set <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> near the top of the script, then reload the page. See SETUP.md for step-by-step instructions.</div>
        ${configError ? `<div style="margin-top:10px;color:var(--rust);">Error detail: ${escapeHtml(configError)}</div>` : ''}
      </div>
    `;
    return;
  }
  try{
    const [{data: projects, error: pErr}, {data: entries, error: eErr}, {data: lineItems, error: lErr}, {data: attachments, error: aErr}] = await Promise.all([
      sb.from('projects').select('*').order('created_at'),
      sb.from('entries').select('*'),
      sb.from('line_items').select('*').order('sort_order'),
      sb.from('attachments').select('*').order('created_at'),
    ]);
    if(pErr || eErr || lErr || aErr){
      throw (pErr || eErr || lErr || aErr);
    }
    state.projects = projects || [];
    state.entries = (entries || []).map(e=>({...e, entryType: e.entry_type, projectId: e.project_id}));
    state.lineItems = (lineItems || []).map(li=>({...li, entryId: li.entry_id, unitPrice: li.unit_price, lineTotal: li.line_total}));
    state.attachments = (attachments || []).map(a=>({...a, entryId: a.entry_id, fileName: a.file_name, storagePath: a.storage_path, sizeBytes: a.size_bytes}));
  }catch(err){
    console.error(err);
    document.getElementById('app').innerHTML = `
      <div class="loading" style="max-width:520px;margin:60px auto;text-align:left;">
        <div style="font-family:'Fraunces',serif;font-size:18px;font-style:italic;color:var(--rust);margin-bottom:10px;">Couldn't load data</div>
        <div>${escapeHtml(err && err.message ? err.message : 'Unknown error')}</div>
        <div style="margin-top:10px;">Double-check the schema.sql has been run in your Supabase project, and that SUPABASE_URL / SUPABASE_ANON_KEY are correct.</div>
      </div>
    `;
    return;
  }
  if(state.projects.length && !ui.selectedProjectId){
    ui.selectedProjectId = state.projects[0].id;
  }
  render();
}

function projectTotals(projectId){
  const entries = state.entries.filter(e=>e.projectId===projectId);
  const total = entries.reduce((s,e)=>s+Number(e.amount||0),0);
  const pending = entries.filter(e=>e.status==='pending').reduce((s,e)=>s+Number(e.amount||0),0);
  const paid = entries.filter(e=>e.status==='paid').reduce((s,e)=>s+Number(e.amount||0),0);
  return {total, pending, paid, count: entries.length};
}
function itemsForEntry(entryId){
  return state.lineItems.filter(li=>li.entryId===entryId).sort((a,b)=>a.sort_order-b.sort_order);
}
function attachmentsForEntry(entryId){
  return state.attachments.filter(a=>a.entryId===entryId);
}

function renderMain(project){
  const main = document.getElementById('main-panel');
  if(!project){
    main.innerHTML = `
      <div class="empty">
        <div class="big">No project selected</div>
        <div>Create a project on the left to start tracking purchase orders and expenses against it.</div>
      </div>
    `;
    return;
  }
  const t = projectTotals(project.id);
  const hasBudget = project.budget !== null && project.budget !== undefined && project.budget !== '';
  const remaining = hasBudget ? Number(project.budget) - t.total : null;

  let entries = state.entries.filter(e=>e.projectId===project.id);
  if(ui.statusFilter !== 'all'){
    entries = entries.filter(e=>e.status===ui.statusFilter);
  }
  if(ui.search.trim()){
    const q = ui.search.trim().toLowerCase();
    entries = entries.filter(e=>
      (e.vendor||'').toLowerCase().includes(q) ||
      (e.description||'').toLowerCase().includes(q) ||
      (e.category||'').toLowerCase().includes(q)
    );
  }
  entries = entries.slice().sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  main.innerHTML = `
    <div class="main-head">
      <div>
        <h2>${escapeHtml(project.name)}</h2>
        ${project.notes ? `<div style="color:var(--ink-soft);font-size:13px;margin-top:4px;max-width:480px;">${escapeHtml(project.notes)}</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn subtle small" id="edit-project-btn">Edit project</button>
        <button class="btn danger small" id="delete-project-btn">Delete</button>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="label">Total logged</div><div class="value">${fmt(t.total)}</div></div>
      <div class="stat"><div class="label">Pending</div><div class="value" style="color:var(--amber)">${fmt(t.pending)}</div></div>
      <div class="stat"><div class="label">Paid</div><div class="value" style="color:var(--teal)">${fmt(t.paid)}</div></div>
      ${hasBudget ? `<div class="stat"><div class="label">Budget remaining</div><div class="value ${remaining<0?'over':''}">${fmt(remaining)}</div></div>` : ''}
    </div>
    <div class="toolbar">
      <button class="btn" id="add-entry-btn">+ Log purchase order / expense</button>
      <input type="text" class="search-input" id="search-input" placeholder="Search vendor, description, category…" value="${escapeAttr(ui.search)}">
      <select id="status-filter">
        <option value="all" ${ui.statusFilter==='all'?'selected':''}>All statuses</option>
        <option value="pending" ${ui.statusFilter==='pending'?'selected':''}>Pending</option>
        <option value="approved" ${ui.statusFilter==='approved'?'selected':''}>Approved</option>
        <option value="paid" ${ui.statusFilter==='paid'?'selected':''}>Paid</option>
      </select>
      <button class="btn subtle small" id="export-csv-btn">Export CSV</button>
    </div>
    ${entries.length===0 ? `
      <div class="empty">
        <div class="big">Nothing logged yet</div>
        <div>Add your first purchase order or expense for this project.</div>
      </div>
    ` : `
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Vendor</th><th>Description</th><th>Category</th><th>Type</th><th>Status</th><th class="amount">Amount</th><th></th>
          </tr>
        </thead>
        <tbody id="entries-body">
          ${entries.map(e=>{
            const n = attachmentsForEntry(e.id).length;
            const itemCount = e.entryType==='po' ? itemsForEntry(e.id).length : 0;
            return `
            <tr data-eid="${e.id}">
              <td style="font-family:'IBM Plex Mono',monospace;font-size:12.5px;white-space:nowrap;">${e.date||''}</td>
              <td>${escapeHtml(e.vendor||'')}</td>
              <td style="max-width:220px;">${escapeHtml(e.description||'')}</td>
              <td><span class="type-chip">${escapeHtml(e.category||'—')}</span></td>
              <td><span class="type-chip">${e.entryType==='po'?('PO'+(itemCount? ' · '+itemCount+' item'+(itemCount!==1?'s':'') : '')):'Expense'}</span></td>
              <td><span class="stamp ${e.status}">${e.status}</span></td>
              <td class="amount">${fmt(e.amount)}${n>0? ` <span class="clip-count" title="${n} attachment${n!==1?'s':''}">📎${n}</span>`:''}</td>
              <td>
                <div class="rowbtns">
                  <button class="btn subtle small" data-files="${e.id}">Files${n>0?' ('+n+')':''}</button>
                  <button class="btn subtle small" data-edit="${e.id}">Edit</button>
                  <button class="btn danger small" data-del="${e.id}">Del</button>
                </div>
              </td>
            </tr>
          `;}).join('')}
        </tbody>
      </table>
    `}
  `;

  document.getElementById('edit-project-btn').onclick = ()=> openProjectModal(project);
  document.getElementById('delete-project-btn').onclick = ()=> deleteProject(project.id);
  document.getElementById('add-entry-btn').onclick = ()=> openEntryModal(project.id);
  document.getElementById('search-input').oninput = (ev)=>{ ui.search = ev.target.value; renderMain(project); attachEntryHandlers(project); };
  document.getElementById('status-filter').onchange = (ev)=>{ ui.statusFilter = ev.target.value; renderMain(project); attachEntryHandlers(project); };
  document.getElementById('export-csv-btn').onclick = ()=> exportCsv(project, entries);

  attachEntryHandlers(project);
}

function attachEntryHandlers(project){
  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick = ()=>{
      const entry = state.entries.find(e=>e.id===btn.dataset.edit);
      openEntryModal(project.id, entry);
    };
  });
  document.querySelectorAll('[data-files]').forEach(btn=>{
    btn.onclick = ()=>{
      const entry = state.entries.find(e=>e.id===btn.dataset.files);
      openAttachmentsModal(project.id, entry);
    };
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=> deleteEntry(btn.dataset.del, project);
  });
}

function attachmentsSectionHtml(entryId){
  const attachments = attachmentsForEntry(entryId);
  return `
    <div class="attach-block">
      <div class="attach-label">Receipts &amp; invoices</div>
      <div class="attach-list" id="attach-list">
        ${attachments.length===0 ? `<div class="attach-empty">No files attached yet.</div>` : attachments.map(a=>`
          <div class="attach-item">
            <a href="${sb.storage.from(ATTACHMENTS_BUCKET).getPublicUrl(a.storagePath).data.publicUrl}" target="_blank" rel="noopener">${escapeHtml(a.fileName)}</a>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="fsize">${fmtBytes(a.sizeBytes)}</span>
              <button type="button" class="btn danger small" data-del-attach="${a.id}" data-path="${escapeAttr(a.storagePath)}">Remove</button>
            </div>
          </div>
        `).join('')}
      </div>
      <input type="file" id="attach-input" multiple>
      <div class="attach-note">Files upload immediately and are saved right away.</div>
    </div>
  `;
}

function wireAttachmentsSection(entryId, onAfterChange){
  const fileInput = document.getElementById('attach-input');
  if(fileInput){
    fileInput.onchange = async (ev)=>{
      const files = Array.from(ev.target.files || []);
      if(!files.length) return;
      for(const file of files){
        try{
          const path = `${entryId}/${Date.now()}_${file.name}`;
          const { error: upErr } = await sb.storage.from(ATTACHMENTS_BUCKET).upload(path, file);
          if(upErr) throw upErr;
          const { error: insErr } = await sb.from('attachments').insert({
            entry_id: entryId, file_name: file.name, storage_path: path,
            size_bytes: file.size, content_type: file.type
          });
          if(insErr) throw insErr;
          showToast(`Uploaded ${file.name}`);
        }catch(err){
          console.error(err);
          showToast(`Upload failed for ${file.name}: ` + (err.message||'unknown error'));
        }
      }
      await loadData();
      onAfterChange();
    };
  }
  document.querySelectorAll('[data-del-attach]').forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm('Remove this attachment?')) return;
      try{
        await sb.storage.from(ATTACHMENTS_BUCKET).remove([btn.dataset.path]);
        const { error } = await sb.from('attachments').delete().eq('id', btn.dataset.delAttach);
        if(error) throw error;
        await loadData();
        showToast('Attachment removed');
        onAfterChange();
      }catch(err){
        console.error(err);
        showToast('Remove failed: ' + (err.message||'unknown error'));
      }
    };
  });
}

function openAttachmentsModal(projectId, entry){
  const existing = document.getElementById('files-modal-overlay');
  if(existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'files-modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Files — ${escapeHtml(entry.vendor || 'entry')}</h3>
      <div style="font-size:12.5px;color:var(--ink-soft);margin:-8px 0 14px;">${escapeHtml(entry.description||'')} ${entry.date? '· '+entry.date : ''}</div>
      ${attachmentsSectionHtml(entry.id)}
      <div class="modal-actions">
        <button class="btn subtle" id="files-close">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (ev)=>{ if(ev.target===overlay) closeFilesModal(); };
  document.getElementById('files-close').onclick = closeFilesModal;
  wireAttachmentsSection(entry.id, ()=>{
    render();
    const fresh = state.entries.find(e=>e.id===entry.id);
    if(fresh) openAttachmentsModal(projectId, fresh);
  });
}
function closeFilesModal(){
  const el = document.getElementById('files-modal-overlay');
  if(el) el.remove();
}

function escapeHtml(str){
  return String(str==null?'':str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(str){ return escapeHtml(str); }

      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="pm-notes" rows="2" placeholder="Client, location, reference number…">${editing? escapeHtml(editing.notes||''):''}</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn subtle" id="pm-cancel">Cancel</button>
        <button class="btn" id="pm-save">${editing? 'Save changes':'Create project'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('pm-name').focus();

  overlay.onclick = (ev)=>{ if(ev.target===overlay) closeProjectModal(); };
  document.getElementById('pm-cancel').onclick = closeProjectModal;
  document.getElementById('pm-save').onclick = async ()=>{
    const name = document.getElementById('pm-name').value.trim();
    if(!name){ showToast('Project needs a name'); return; }
    const budgetVal = document.getElementById('pm-budget').value;
    const notes = document.getElementById('pm-notes').value.trim();
    const saveBtn = document.getElementById('pm-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try{
      if(editing){
        const { error } = await sb.from('projects').update({
          name, budget: budgetVal===''? null : Number(budgetVal), notes
        }).eq('id', editing.id);
        if(error) throw error;
      } else {
        const { data, error } = await sb.from('projects').insert({
          name, budget: budgetVal===''? null : Number(budgetVal), notes
        }).select().single();
        if(error) throw error;
        ui.selectedProjectId = data.id;
      }
      await loadData();
      closeProjectModal();
      showToast(editing? 'Project updated' : 'Project created');
    }catch(err){
      console.error(err);
      showToast('Save failed: ' + (err.message||'unknown error'));
      saveBtn.disabled = false; saveBtn.textContent = editing? 'Save changes':'Create project';
    }
  };
}
function closeProjectModal(){
  const el = document.getElementById('project-modal-overlay');
  if(el) el.remove();
}

async function deleteProject(id){
  const proj = state.projects.find(p=>p.id===id);
  if(!confirm(`Delete "${proj.name}" and all its logged entries? This cannot be undone.`)) return;
  try{
    const { error } = await sb.from('projects').delete().eq('id', id);
    if(error) throw error;
    if(ui.selectedProjectId===id) ui.selectedProjectId = null;
    await loadData();
    showToast('Project deleted');
  }catch(err){
    console.error(err);
    showToast('Delete failed: ' + (err.message||'unknown error'));
  }
}

// ---------- Entry modal ----------
function openEntryModal(projectId, editing){
  ui.modalItems = editing && editing.entryType==='po'
    ? itemsForEntry(editing.id).map(li=>({description:li.description, quantity:li.quantity, unitPrice:li.unitPrice}))
    : [];
  renderEntryModal(projectId, editing);
}

function renderEntryModal(projectId, editing){
  const existing = document.getElementById('entry-modal-overlay');
  if(existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'entry-modal-overlay';
  const entryType = document.getElementById('em-type-live') ? document.getElementById('em-type-live').value : (editing? editing.entryType : 'po');

  const attachments = editing ? attachmentsForEntry(editing.id) : [];

  overlay.innerHTML = `
    <div class="modal">
      <h3>${editing? 'Edit entry' : 'Log purchase order / expense'}</h3>
      <div class="field-row">
        <div class="field">
          <label>Type</label>
          <select id="em-type-live">
            <option value="po" ${entryType==='po'?'selected':''}>Purchase Order (itemized)</option>
            <option value="expense" ${entryType==='expense'?'selected':''}>Expense (single amount)</option>
          </select>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="em-status">
            <option value="pending" ${!editing || editing.status==='pending'?'selected':''}>Pending</option>
            <option value="approved" ${editing && editing.status==='approved'?'selected':''}>Approved</option>
            <option value="paid" ${editing && editing.status==='paid'?'selected':''}>Paid</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Vendor / payee</label>
        <input type="text" id="em-vendor" value="${editing? escapeAttr(editing.vendor||''):''}" placeholder="e.g. Acme Supply Co.">
      </div>
      <div class="field">
        <label>Description</label>
        <input type="text" id="em-description" value="${editing? escapeAttr(editing.description||''):''}" placeholder="What was this for?">
      </div>

      ${entryType==='po' ? `
        <div class="items-block" id="items-block">
          <div class="items-label">Line items</div>
          <div class="items-head-row"><div>Description</div><div>Qty</div><div>Unit price</div><div>Total</div><div></div></div>
          <div id="item-rows"></div>
          <button type="button" class="btn ghost small" id="add-item-row" style="margin-top:4px;">+ Add line</button>
          <div class="items-total-row"><span>Total:</span><span id="items-total-value">${fmt(0)}</span></div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Date</label>
            <input type="date" id="em-date" value="${editing? (editing.date||'') : new Date().toISOString().slice(0,10)}">
          </div>
          <div class="field">
            <label>Category</label>
            <input type="text" id="em-category" list="cat-list" value="${editing? escapeAttr(editing.category||''):''}" placeholder="e.g. Materials">
          </div>
        </div>
      ` : `
        <div class="field-row">
          <div class="field">
            <label>Amount (USD)</label>
            <input type="number" id="em-amount" value="${editing && editing.entryType==='expense'? editing.amount : ''}" placeholder="0.00" min="0" step="0.01">
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="em-date" value="${editing? (editing.date||'') : new Date().toISOString().slice(0,10)}">
          </div>
        </div>
        <div class="field">
          <label>Category</label>
          <input type="text" id="em-category" list="cat-list" value="${editing? escapeAttr(editing.category||''):''}" placeholder="e.g. Materials">
        </div>
      `}
      <datalist id="cat-list">${CATEGORIES.map(c=>`<option value="${c}">`).join('')}</datalist>

      ${editing ? attachmentsSectionHtml(editing.id) : `
        <div class="attach-note" style="margin-bottom:12px;">Save this entry first, then reopen it to attach receipts or invoices.</div>
      `}

      <div class="modal-actions">
        <button class="btn subtle" id="em-cancel">Cancel</button>
        <button class="btn" id="em-save">${editing? 'Save changes':'Add entry'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('em-vendor').focus();

  overlay.onclick = (ev)=>{ if(ev.target===overlay) closeEntryModal(); };
  document.getElementById('em-cancel').onclick = closeEntryModal;
  document.getElementById('em-type-live').onchange = ()=> renderEntryModal(projectId, editing);

  if(entryType==='po'){
    renderItemRows();
    document.getElementById('add-item-row').onclick = ()=>{
      ui.modalItems.push({description:'', quantity:1, unitPrice:0});
      renderItemRows();
    };
  }

  if(editing){
    wireAttachmentsSection(editing.id, ()=>{
      render();
      renderEntryModal(projectId, state.entries.find(e=>e.id===editing.id));
    });
  }

  document.getElementById('em-save').onclick = async ()=>{
    const currentType = document.getElementById('em-type-live').value;
    const vendor = document.getElementById('em-vendor').value.trim();
    if(!vendor){ showToast('Vendor / payee is required'); return; }

    let amount = 0;
    if(currentType==='po'){
      const validItems = ui.modalItems.filter(it=> (it.description||'').trim() !== '' || Number(it.quantity)>0);
      if(validItems.length===0){ showToast('Add at least one line item'); return; }
      amount = validItems.reduce((s,it)=> s + Number(it.quantity||0)*Number(it.unitPrice||0), 0);
      if(amount<=0){ showToast('Line item total must be greater than 0'); return; }
    } else {
      amount = Number(document.getElementById('em-amount').value || 0);
      if(amount<=0){ showToast('Enter an amount greater than 0'); return; }
    }

    const payload = {
      entry_type: currentType,
      status: document.getElementById('em-status').value,
      vendor,
      description: document.getElementById('em-description').value.trim(),
      amount,
      date: document.getElementById('em-date').value || null,
      category: document.getElementById('em-category').value.trim(),
    };

    const saveBtn = document.getElementById('em-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try{
      let entryId;
      if(editing){
        entryId = editing.id;
        const { error } = await sb.from('entries').update(payload).eq('id', entryId);
        if(error) throw error;
      } else {
        payload.project_id = projectId;
        const { data, error } = await sb.from('entries').insert(payload).select().single();
        if(error) throw error;
        entryId = data.id;
      }

      if(currentType==='po'){
        // Replace all line items for this entry with the current in-memory set
        const { error: delErr } = await sb.from('line_items').delete().eq('entry_id', entryId);
        if(delErr) throw delErr;
        const validItems = ui.modalItems.filter(it=> (it.description||'').trim() !== '' || Number(it.quantity)>0);
        if(validItems.length){
          const rows = validItems.map((it, idx)=>({
            entry_id: entryId,
            description: (it.description||'').trim(),
            quantity: Number(it.quantity||0),
            unit_price: Number(it.unitPrice||0),
            sort_order: idx
          }));
          const { error: insErr } = await sb.from('line_items').insert(rows);
          if(insErr) throw insErr;
        }
      } else if(editing && editing.entryType==='po'){
        // Type was switched away from PO — clear any old line items
        await sb.from('line_items').delete().eq('entry_id', entryId);
      }

      await loadData();
      const freshEntry = state.entries.find(e=>e.id===entryId);
      showToast(editing? 'Entry updated' : 'Entry logged');
      // Reopen in edit mode so attachments can be added right away
      openEntryModal(projectId, freshEntry);
    }catch(err){
      console.error(err);
      showToast('Save failed: ' + (err.message||'unknown error'));
      saveBtn.disabled = false; saveBtn.textContent = editing? 'Save changes':'Add entry';
    }
  };
}

function renderItemRows(){
  const wrap = document.getElementById('item-rows');
  if(!wrap) return;
  wrap.innerHTML = ui.modalItems.map((it, idx)=>`
    <div class="item-row" data-idx="${idx}">
      <input type="text" class="it-desc" placeholder="Item description" value="${escapeAttr(it.description)}">
      <input type="number" class="it-qty" min="0" step="0.01" value="${it.quantity}">
      <input type="number" class="it-price" min="0" step="0.01" value="${it.unitPrice}">
      <div class="item-total">${fmt(Number(it.quantity||0)*Number(it.unitPrice||0))}</div>
      <button type="button" class="rm-item" title="Remove line">×</button>
    </div>
  `).join('');

  wrap.querySelectorAll('.item-row').forEach(row=>{
    const idx = Number(row.dataset.idx);
    row.querySelector('.it-desc').oninput = (ev)=>{ ui.modalItems[idx].description = ev.target.value; };
    row.querySelector('.it-qty').oninput = (ev)=>{ ui.modalItems[idx].quantity = ev.target.value; updateItemsTotal(); row.querySelector('.item-total').textContent = fmt(Number(ev.target.value||0)*Number(ui.modalItems[idx].unitPrice||0)); };
    row.querySelector('.it-price').oninput = (ev)=>{ ui.modalItems[idx].unitPrice = ev.target.value; updateItemsTotal(); row.querySelector('.item-total').textContent = fmt(Number(ui.modalItems[idx].quantity||0)*Number(ev.target.value||0)); };
    row.querySelector('.rm-item').onclick = ()=>{ ui.modalItems.splice(idx,1); renderItemRows(); updateItemsTotal(); };
  });
  updateItemsTotal();
}
function updateItemsTotal(){
  const totalEl = document.getElementById('items-total-value');
  if(!totalEl) return;
  const total = ui.modalItems.reduce((s,it)=> s + Number(it.quantity||0)*Number(it.unitPrice||0), 0);
  totalEl.textContent = fmt(total);
}

function closeEntryModal(){
  const el = document.getElementById('entry-modal-overlay');
  if(el) el.remove();
  ui.modalItems = [];
}

async function deleteEntry(id, project){
  if(!confirm('Delete this entry? Any attached files will also be removed.')) return;
  try{
    const atts = attachmentsForEntry(id);
    if(atts.length){
      await sb.storage.from(ATTACHMENTS_BUCKET).remove(atts.map(a=>a.storagePath));
    }
    const { error } = await sb.from('entries').delete().eq('id', id);
    if(error) throw error;
    await loadData();
    renderMain(state.projects.find(p=>p.id===project.id));
    showToast('Entry deleted');
  }catch(err){
    console.error(err);
    showToast('Delete failed: ' + (err.message||'unknown error'));
  }
}

function exportCsv(project, entries){
  const header = ['Date','Vendor','Description','Category','Type','Status','Amount','Line Items'];
  const rows = entries.map(e=>{
    const items = e.entryType==='po' ? itemsForEntry(e.id) : [];
    const itemsStr = items.map(it=>`${it.description} (${it.quantity} x ${it.unitPrice})`).join('; ');
    return [e.date, e.vendor, e.description, e.category, e.entryType==='po'?'Purchase Order':'Expense', e.status, e.amount, itemsStr];
  });
  const csv = [header, ...rows].map(r=>r.map(cell=>{
    const s = String(cell ?? '');
    return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${project.name.replace(/[^a-z0-9]+/gi,'-').toLowerCase()}-ledger.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

loadData();

</script>
