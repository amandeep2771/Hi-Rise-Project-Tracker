<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HRC Ledger — Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="app" id="app">
  <div class="loading">loading ledger…</div>
</div>
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
let state = { projects: [], entries: [] };

async function loadData() {
  if (!configOk) {
    document.getElementById('app').innerHTML = renderTopNav('dashboard') + configErrorHtml();
    return;
  }
  try {
    const [{ data: projects, error: pErr }, { data: entries, error: eErr }] = await Promise.all([
      sb.from('projects').select('*').order('created_at'),
      sb.from('entries').select('*'),
    ]);
    if (pErr || eErr) throw (pErr || eErr);
    state.projects = projects || [];
    state.entries = (entries || []).map(e => ({ ...e, entryType: e.entry_type, projectId: e.project_id }));
  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = renderTopNav('dashboard') + loadErrorHtml(err);
    return;
  }
  render();
}

function projectTotals(projectId) {
  const entries = state.entries.filter(e => e.projectId === projectId);
  const total = entries.reduce((s, e) => s + Number(e.amount || 0), 0);
  const pending = entries.filter(e => e.status === 'pending').reduce((s, e) => s + Number(e.amount || 0), 0);
  const paid = entries.filter(e => e.status === 'paid').reduce((s, e) => s + Number(e.amount || 0), 0);
  return { total, pending, paid, count: entries.length };
}

function render() {
  if (!configOk) return;
  const app = document.getElementById('app');
  const projects = state.projects;

  app.innerHTML = `
    ${renderTopNav('dashboard')}
    <div class="main-head">
      <h2>Projects</h2>
      <button class="btn" id="new-project-btn">+ New project</button>
    </div>
    <div class="tag" style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:16px;display:block;">purchase orders &amp; expenses — by project</div>
    <div id="project-grid"></div>
    <div class="footnote">Shared live across your team — no login. Keep this URL private.</div>
  `;

  const grid = document.getElementById('project-grid');
  if (projects.length === 0) {
    grid.innerHTML = `
      <div class="panel">
        <div class="empty">
          <div class="big">No projects yet</div>
          <div>Create your first project to start logging purchase orders and expenses.</div>
        </div>
      </div>
    `;
  } else {
    grid.innerHTML = `
      <div class="panel" style="padding:8px;">
        ${projects.map(p => {
          const t = projectTotals(p.id);
          const hasBudget = p.budget !== null && p.budget !== undefined && p.budget !== '';
          const pct = hasBudget && Number(p.budget) > 0 ? Math.min(100, (t.total / Number(p.budget)) * 100) : 0;
          const over = hasBudget && t.total > Number(p.budget);
          return `
            <a class="project-item" href="project.html?id=${p.id}" style="display:block;padding:14px;">
              <div class="pname" style="font-size:16px;"><span>${escapeHtml(p.name)}</span><span>${fmt(t.total)}</span></div>
              ${p.notes ? `<div style="color:var(--ink-soft);font-size:12.5px;margin-top:4px;max-width:600px;">${escapeHtml(p.notes)}</div>` : ''}
              <div class="pmeta"><span>${t.count} ${t.count === 1 ? 'entry' : 'entries'}</span><span>${hasBudget ? 'of ' + fmt(p.budget) : 'no budget set'}</span></div>
              ${hasBudget ? `<div class="bar ${over ? 'over' : ''}"><div style="width:${pct}%"></div></div>` : ''}
            </a>
          `;
        }).join('')}
      </div>
    `;
  }

  document.getElementById('new-project-btn').onclick = () => openProjectModal();
}

// ---------- Project modal ----------
function openProjectModal(editing) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'project-modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${editing ? 'Edit project' : 'New project'}</h3>
      <div class="field">
        <label>Project name</label>
        <input type="text" id="pm-name" value="${editing ? escapeAttr(editing.name) : ''}" placeholder="e.g. Riverside Office Fit-out">
      </div>
      <div class="field">
        <label>Budget (optional)</label>
        <input type="number" id="pm-budget" value="${editing && editing.budget != null ? editing.budget : ''}" placeholder="e.g. 50000" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="pm-notes" rows="2" placeholder="Client, location, reference number…">${editing ? escapeHtml(editing.notes || '') : ''}</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn subtle" id="pm-cancel">Cancel</button>
        <button class="btn" id="pm-save">${editing ? 'Save changes' : 'Create project'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('pm-name').focus();

  overlay.onclick = (ev) => { if (ev.target === overlay) closeProjectModal(); };
  document.getElementById('pm-cancel').onclick = closeProjectModal;
  document.getElementById('pm-save').onclick = async () => {
    const name = document.getElementById('pm-name').value.trim();
    if (!name) { showToast('Project needs a name'); return; }
    const budgetVal = document.getElementById('pm-budget').value;
    const notes = document.getElementById('pm-notes').value.trim();
    const saveBtn = document.getElementById('pm-save');
    saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
    try {
      if (editing) {
        const { error } = await sb.from('projects').update({
          name, budget: budgetVal === '' ? null : Number(budgetVal), notes
        }).eq('id', editing.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from('projects').insert({
          name, budget: budgetVal === '' ? null : Number(budgetVal), notes
        });
        if (error) throw error;
      }
      await loadData();
      closeProjectModal();
      showToast(editing ? 'Project updated' : 'Project created');
    } catch (err) {
      console.error(err);
      showToast('Save failed: ' + (err.message || 'unknown error'));
      saveBtn.disabled = false; saveBtn.textContent = editing ? 'Save changes' : 'Create project';
    }
  };
}
function closeProjectModal() {
  const el = document.getElementById('project-modal-overlay');
  if (el) el.remove();
}

loadData();
</script>
</body>
</html>
